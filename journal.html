<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 Journal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="user-profile" onclick="toggleUserMenu()">
    <div class="avatar" id="avatarLetter"></div>
    <div class="user-menu" id="userMenu">
        <p id="loggedUser"></p>
        <button onclick="logout()">🚪 Logout</button>
    </div>
</div>
<h1>📖 Personal Journal</h1>

<div class="card">
    <h2>✍️ Write Today's Thoughts</h2>
    <textarea id="journalText" rows="5" placeholder="Write your thoughts here..."></textarea>
    <br><br>
    <button onclick="saveJournal()">💾 Save Journal</button>
    <p id="journalStatus"></p>
</div>

<div class="card">
    <h2>📚 Previous Journals</h2>
    <div id="journalList"></div>
</div>

<button onclick="goBack()">⬅ Back to Dashboard</button>

<script src="script.js"></script>
</body>
</html>
